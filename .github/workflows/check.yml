name: Vérifcation du code
on:
 push:
  branches: [main]
 pull_request:
  branches: [main]

jobs:
 check-python:
  runs-on: ubuntu-latest

  steps:
   - name: Récupérer le code
     uses: actions/checkout@v4

   - name: Installer Python 3.12
     uses: actions/setup-python@v5
     with:
      python-version: '3.12'

   - name: Vérifer la syntaxe
     run: python -m py_compile calcul.py

   - name: Afcher un message de succès
     run: echo "Le code est valide !"
